# Default values for whisperx

# Optional env vars for the app (e.g. ALIGN_PRELOAD_LANGUAGES=en,fr to preload alignment models at startup).
# Metrics: METRICS_NAMESPACE (default "whisperx") prefixes Prometheus metric names on GET /metrics.
#   - name: METRICS_NAMESPACE
#     value: "whisperx"
# OpenTelemetry: traces = OTLP push; metrics = pull on GET /metrics. Disabled by default.
# Example to enable (TraceContext+Baggage propagator, X-Trace-Id in response and logs):
#   - name: OTEL_ENABLED
#     value: "true"
#   - name: OTEL_EXPORTER_OTLP_ENDPOINT
#     value: "http://grafana-alloy.grafana-alloy:4318"
#   - name: OTEL_SERVICE_NAME
#     value: "whisperx"
#   - name: OTEL_SERVICE_VERSION
#     value: "1.0.0"
#   - name: OTEL_TRACES_SAMPLER_ARG
#     value: "0.5"
extraEnv:
  - name: ALIGN_PRELOAD_LANGUAGES
    value: "en,fr"

whisperx:
  replicaCount: 1
  image:
    repository: kperreau/whisperx
    tag: v1.0.13
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "0.5"
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
      ephemeral-storage: 3Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 70
  traefik:
    enabled: false
    host: whisperx.domain.com
    # Routes exposed via Traefik (path or pathPrefix).
    routes:
      - path: /
    certResolver: letsencrypt
    stripPrefixes: []
    middlewares: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

# KEDA ScaledObject (disabled by default). Scale on transcribe queue depth via Prometheus.
# Mutually exclusive with whisperx.autoscaling: only one of HPA or KEDA should be enabled.
keda:
  enabled: false
  minReplicaCount: 1
  maxReplicaCount: 3
  prometheus:
    serverAddress: http://grafana-mimir-gateway.grafana/prometheus
    # Sum of transcribe_requests_in_flight across pods; scale when >= threshold.
    # If your Prometheus adds namespace/pod labels, scope e.g. namespace=Release.Namespace, pod=~"whisperx-.*"
    query: sum(whisperx_transcribe_requests_in_flight) or vector(0)
    threshold: "3"
    ignoreNullValues: "true"

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []
# - name: docker-auth

rbac:
  extraRules: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  enabled: true
  type: ClusterIP
  # API (transcribe, docs)
  port: 3000
  # Technical server: livez, readyz, metrics (probes and Prometheus scrape)
  technicalPort: 5000

livenessProbe:
  httpGet:
    path: /livez
    port: 5000
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 5000
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

argocd:
  enabled: false
  # Argo CD Application source (when enabled)
  project: default
  repoURL: https://github.com/homiclip/whisperx.git
  targetRevision: HEAD
  path: _deploy/helm
  valueFiles:
    - values.yaml

pprof:
  enabled: false