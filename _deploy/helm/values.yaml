# Default values for whisperx

# Optional env vars for the app (e.g. ALIGN_PRELOAD_LANGUAGES=en,fr to preload alignment models at startup).
# OpenTelemetry (traces + metrics), disabled by default. Config aligned with homiclip-backend.
# Example to enable (TraceContext+Baggage propagator, X-Trace-Id in response and logs):
#   - name: OTEL_ENABLED
#     value: "true"
#   - name: OTEL_EXPORTER_OTLP_ENDPOINT
#     value: "http://grafana-alloy.grafana-alloy:4318"
#   - name: OTEL_SERVICE_NAME
#     value: "whisperx"
#   - name: OTEL_SERVICE_VERSION
#     value: "1.0.0"
#   - name: OTEL_TRACES_SAMPLER_ARG
#     value: "0.5"
extraEnv:
  - name: ALIGN_PRELOAD_LANGUAGES
    value: "en,fr"

whisperx:
  replicaCount: 1
  image:
    repository: kperreau/whisperx
    tag: v1.0.8
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "0.5"
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
      ephemeral-storage: 3Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    # Scale based on requests per second per pod. Requires custom metrics in the cluster
    # (e.g. Prometheus Adapter with a rule exposing http_requests_per_second per pod).
    targetRequestsPerSecond: 3
    # Metric name exposed by your metrics adapter (must match the adapter rule name).
    requestsPerSecondMetricName: http_requests_per_second
    # Optional: fallback to CPU/memory if set (use with targetRequestsPerSecond or alone).
    targetCPUUtilizationPercentage: ""
    targetMemoryUtilizationPercentage: ""
  traefik:
    enabled: false
    host: whisperx.domain.com
    # Routes exposed via Traefik (path or pathPrefix).
    routes:
      - path: /
    certResolver: letsencrypt
    stripPrefixes: []
    middlewares: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []
# - name: docker-auth

rbac:
  extraRules: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  enabled: true
  type: ClusterIP
  port: 8000

livenessProbe:
  httpGet:
    path: /livez
    port: 8000
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

argocd:
  enabled: false
  # Argo CD Application source (when enabled)
  project: default
  repoURL: https://github.com/homiclip/whisperx.git
  targetRevision: HEAD
  path: _deploy/helm
  valueFiles:
    - values.yaml

pprof:
  enabled: false