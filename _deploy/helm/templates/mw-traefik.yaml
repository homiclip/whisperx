{{- $stripPrefixes := .Values.whisperx.traefik.stripPrefixes | default list }}
{{- if and .Values.whisperx.traefik.enabled (gt (len $stripPrefixes) 0) }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix-whisperx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "whisperx.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
    {{- with $stripPrefixes }}
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
