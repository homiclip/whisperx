{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: whisperx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "whisperx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.technicalPort }}
      targetPort: technical
      protocol: TCP
      name: technical
  selector:
    app.kubernetes.io/name: whisperx
    app.kubernetes.io/instance: whisperx
{{- end }}
